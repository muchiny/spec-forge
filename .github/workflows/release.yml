name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux (x64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - label: macOS (Intel)
            os: macos-13
            target: x86_64-apple-darwin
          - label: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
          - label: Windows (x64)
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      # --- Rust ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # --- Node.js ---
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer les dependances frontend
        working-directory: ui
        run: npm ci

      # --- Deps systeme Linux ---
      - name: Installer les deps systeme (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # --- Build Tauri ---
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Spec Forge ${{ github.ref_name }}"
          releaseBody: |
            Spec Forge ${{ github.ref_name }}

            Transforme des User Stories en Specifications ISO 29148 et Tests Gherkin/BDD.

            ## Installation
            - **Windows** : Telecharger `.msi` ou `.exe`
            - **macOS** : Telecharger `.dmg`
            - **Linux** : Telecharger `.deb` ou `.AppImage`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # Build CLI seul (pour les utilisateurs sans GUI)
  build-cli:
    name: CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release CLI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Preparer l'archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGING="spec-forge-cli-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$STAGING"
          cp target/${{ matrix.target }}/release/spec-forge "$STAGING/"
          cp -r templates "$STAGING/"
          cp config.yaml LICENSE README.md "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"
          echo "ASSET=$STAGING.tar.gz" >> "$GITHUB_ENV"

      - name: Preparer l'archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $staging = "spec-forge-cli-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging
          Copy-Item "target/${{ matrix.target }}/release/spec-forge.exe" $staging
          Copy-Item -Recurse "templates" $staging
          Copy-Item "config.yaml","LICENSE","README.md" $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload vers la release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ env.ASSET }}
